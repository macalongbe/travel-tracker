name: Build Android APK

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Download Gradle wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -sL -o gradle/wrapper/gradle-wrapper.jar \
          https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar
        curl -sL -o gradle/wrapper/gradle-wrapper.properties \
          https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.properties
        curl -sL -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew
        chmod +x gradlew
    
    - name: Build debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: travel-tracker-debug
        path: app/build/outputs/apk/debug/
